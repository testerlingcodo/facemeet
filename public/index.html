<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>FaceMeet</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- JOIN SCREEN -->
  <div id="join-screen" class="screen active">
    <div class="join-card">
      <div class="logo">
        <span class="logo-icon">📹</span>
        <h1>FaceMeet</h1>
        <p>Free video meetings. No account needed.</p>
      </div>
      <div class="join-form">
        <input type="text" id="name-input" placeholder="Your name" maxlength="30" autocomplete="off" />
        <div class="room-row">
          <input type="text" id="room-input" placeholder="Room code (e.g. ABC123)" maxlength="20" autocomplete="off" />
          <button id="random-btn" title="Random code">🎲</button>
        </div>
        <button id="join-btn" class="btn-primary">Join Meeting</button>
        <p class="hint">Share the room code with others to let them join</p>
      </div>
    </div>
  </div>

  <!-- MEETING SCREEN -->
  <div id="meeting-screen" class="screen">
    <div id="header">
      <div id="room-display">
        Room: <span id="room-code-display"></span>
        <button id="copy-btn" title="Copy room code">📋</button>
      </div>
      <div id="participant-count">👥 <span id="count">1</span></div>
    </div>

    <div id="video-grid"></div>

    <!-- FILTER PANEL -->
    <div id="filter-panel">
      <div id="filter-list">
        <button class="filter-btn active" data-filter="none">
          <span class="filter-preview fp-none">Aa</span>
          <span>Normal</span>
        </button>
        <button class="filter-btn" data-filter="grayscale(100%)">
          <span class="filter-preview fp-gray">Aa</span>
          <span>B&amp;W</span>
        </button>
        <button class="filter-btn" data-filter="sepia(100%)">
          <span class="filter-preview fp-sepia">Aa</span>
          <span>Sepia</span>
        </button>
        <button class="filter-btn" data-filter="invert(100%)">
          <span class="filter-preview fp-invert">Aa</span>
          <span>Invert</span>
        </button>
        <button class="filter-btn" data-filter="hue-rotate(180deg) saturate(150%)">
          <span class="filter-preview fp-cool">Aa</span>
          <span>Cool</span>
        </button>
        <button class="filter-btn" data-filter="sepia(50%) saturate(200%) hue-rotate(-20deg)">
          <span class="filter-preview fp-warm">Aa</span>
          <span>Warm</span>
        </button>
        <button class="filter-btn" data-filter="saturate(250%) contrast(110%)">
          <span class="filter-preview fp-vivid">Aa</span>
          <span>Vivid</span>
        </button>
        <button class="filter-btn" data-filter="brightness(60%) contrast(120%)">
          <span class="filter-preview fp-dark">Aa</span>
          <span>Dark</span>
        </button>
        <button class="filter-btn" data-filter="contrast(150%) brightness(90%)">
          <span class="filter-preview fp-punch">Aa</span>
          <span>Punch</span>
        </button>
        <button class="filter-btn" data-filter="blur(3px)">
          <span class="filter-preview fp-blur">Aa</span>
          <span>Blur</span>
        </button>
      </div>

      <!-- AR EFFECTS ROW -->
      <div id="ar-section">
        <div class="filter-section-label">✨ AR Effects</div>
        <div id="ar-list">
          <button class="ar-btn active" data-ar="none">
            <span class="ar-preview">🚫</span>
            <span>Off</span>
          </button>
          <button class="ar-btn" data-ar="dog">
            <span class="ar-preview">🐶</span>
            <span>Dog</span>
          </button>
          <button class="ar-btn" data-ar="cat">
            <span class="ar-preview">🐱</span>
            <span>Cat</span>
          </button>
          <button class="ar-btn" data-ar="bunny">
            <span class="ar-preview">🐰</span>
            <span>Bunny</span>
          </button>
          <button class="ar-btn" data-ar="glasses">
            <span class="ar-preview">🕶️</span>
            <span>Shades</span>
          </button>
          <button class="ar-btn" data-ar="crown">
            <span class="ar-preview">👑</span>
            <span>Crown</span>
          </button>
        </div>
      </div>
    </div>

    <div id="controls">

      <div class="ctrl-wrap">
        <button id="mic-btn" class="ctrl-btn" title="Toggle mic">
          <!-- MIC ON -->
          <svg id="mic-icon-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 11a7 7 0 0 0 14 0M12 18v4M8 22h8" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
          </svg>
          <!-- MIC OFF -->
          <svg id="mic-icon-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" style="display:none">
            <rect x="9" y="2" width="6" height="11" rx="3" opacity="0.4"/>
            <path d="M5 11a7 7 0 0 0 14 0M12 18v4M8 22h8" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
            <line x1="3" y1="3" x2="21" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="ctrl-label" id="mic-label">Mute</span>
      </div>

      <div class="ctrl-wrap">
        <div class="cam-group">
          <button id="cam-btn" class="ctrl-btn" title="Toggle camera">
            <!-- CAM ON -->
            <svg id="cam-icon-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white">
              <rect x="2" y="6" width="14" height="12" rx="2"/>
              <path d="M16 9l5-3v12l-5-3V9z"/>
            </svg>
            <!-- CAM OFF -->
            <svg id="cam-icon-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" style="display:none">
              <rect x="2" y="6" width="14" height="12" rx="2" opacity="0.4"/>
              <path d="M16 9l5-3v12l-5-3V9z" opacity="0.4"/>
              <line x1="3" y1="3" x2="21" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </button>
          <button id="cam-select-btn" class="ctrl-btn-arrow" title="Choose camera">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 6" fill="white">
              <path d="M1 1l4 4 4-4"/>
            </svg>
          </button>
        </div>
        <span class="ctrl-label" id="cam-label">Stop Video</span>

        <!-- Camera picker dropdown -->
        <div id="cam-picker" class="cam-picker" style="display:none">
          <div class="cam-picker-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="14" height="14">
              <rect x="2" y="6" width="14" height="12" rx="2"/>
              <path d="M16 9l5-3v12l-5-3V9z"/>
            </svg>
            Select a Camera
          </div>
          <ul id="cam-list"></ul>
        </div>
      </div>

      <div class="ctrl-wrap">
        <button id="filter-btn-toggle" class="ctrl-btn" title="Video filters">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
        <span class="ctrl-label">Filters</span>
      </div>

      <div class="ctrl-wrap">
        <button id="leave-btn" class="ctrl-btn danger" title="Leave meeting">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
            <path d="M18 6l3 3M21 6l-3 3" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="ctrl-label">Leave</span>
      </div>

    </div>

    <div id="toast"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
